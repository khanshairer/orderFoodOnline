<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Bangladeshi Kitchen</h1>
    </header>
    <main>
        <section id="menu">
  <nav>
    <ul>
      <li><a href="#">Pizza</a></li>
      <li><a href="#">Burger</a></li>
      <li><a href="#">Pasta</a></li>
      <li><a href="#">Salad</a></li>
      <li><a href="cart.html">View Cart</a></li>
    </ul>
  </nav>
</section>


        <section id="photo-section">
            <div class="photo">
                <img id="piz" src="resources/food-images/pizza.jpg" alt="Pizza">
                <p>Delicious Pizza</p>
                <p class="caption">A classic Italian dish with a crispy crust.</p>
                <p id="pizza-price">$12.99</p>
                <table class="quantity">
                    <tr>
                        <td><label for="quantity">Quantity:</label></td>
                        <td><button class="remove-item">-</button></td>
                        <td><p class = "total-items" value="1">1</p></td>
                        <td><button class="add-item">+</button></td>

                    </tr>
                </table>
                <button class="order-button">Order Now</button>
            </div>
            <div class="photo">
                <img id  = "burger" src="resources/food-images/burger.jpg" alt="Burger">
                <p>Juicy Burger</p>
                <p class="caption">A mouth-watering beef burger with cheese.</p>
                <p id="burger-price">$10.99</p>
                <table class="quantity">
                    <tr>
                        <td><label for="quantity">Quantity:</label></td>
                        <td><button class="remove-item">-</button></td>
                        <td><p class = "total-items" value="1">1</p></td>
                        <td><button class="add-item">+</button></td>

                    </tr>
                </table>
                <button class="order-button">Order Now</button>
            </div>
            <div class="photo">
                <img src="resources/food-images/pasta.jpg" alt="Pasta">
                <p>Italian Pasta</p>
                <p class="caption">Creamy Alfredo pasta with mushrooms.</p>
                <p id="pasta-price">$11.99</p>
                <table class="quantity">
                    <tr>
                        <td><label for="quantity">Quantity:</label></td>
                        <td><button class="remove-item">-</button></td>
                        <td><p class = "total-items" value="1">1</p></td>
                        <td><button class="add-item">+</button></td>

                    </tr>
                </table>
                <button class="order-button">Order Now</button>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2023 Food App</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
